---
template:
  direction: Horizontal
  parts:
    - direction: Vertical
      borderless: true
      split_size:
        Fixed: 1
      run:
        plugin:
          location: "zellij:tab-bar"
    - direction: Vertical
      body: true
    - direction: Vertical
      borderless: true
      split_size:
        Fixed: 2
      run:
        plugin:
          location: "zellij:status-bar"
tabs:
  - name: "Code"
    focus: true
    run:
      command: {cmd: 'n'}
  - name: "Runtime"
    run:
      command: {cmd: 'yarn', args: ['start']}
session:
  name: 'Node'
  attach: true
